name: Telegram Notifications

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Notification
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_ACTION: ${{ github.event.action }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          set -e

          if [ "$EVENT_NAME" = "push" ]; then
            COUNT=$(echo "$COMMITS_JSON" | jq 'length')

            if [ "$COUNT" -eq 0 ]; then
              echo "No commits in push event, skipping."
              exit 0
            fi

            COMMIT_LIST=$(echo "$COMMITS_JSON" | jq -r '.[] | "`\(.id[0:7])` \(.message | split("\n")[0]) - \(.author.username // .author.name)"')

            MESSAGE="🚀 [$REPO:$REF_NAME] $COUNT new commit(s) by $ACTOR

          $COMMIT_LIST

          🔗 https://github.com/$REPO/commits/$REF_NAME"

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            MESSAGE="🔀 Pull Request $PR_ACTION

          📦 Repository: $REPO
          👤 User: $ACTOR
          📌 Title: $PR_TITLE
          🌿 $PR_HEAD → $PR_BASE

          🔗 $PR_URL"

          elif [ "$EVENT_NAME" = "release" ]; then
            MESSAGE="🎉 New Release Published

          📦 Repository: $REPO
          🏷️ Tag: $RELEASE_TAG
          📌 Name: $RELEASE_NAME

          🔗 $RELEASE_URL"

          else
            MESSAGE="📣 GitHub Event: $EVENT_NAME
          📦 Repository: $REPO
          👤 User: $ACTOR"
          fi

          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d chat_id="$CHAT_ID" \
            -d parse_mode="Markdown" \
            --data-urlencode text="$MESSAGE"